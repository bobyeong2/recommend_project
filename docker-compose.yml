services:
  # FastAPI 애플리케이션
  app:
    build: .
    container_name: bob_app  # 오타 수정: contariner_name → container_name
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis
    environment:
      # DB 연결 정보 (컨테이너 간 통신)
      DB_HOST: mysql        # 서비스 이름으로 접근
      DB_PORT: 3306         # 컨테이너 내부 포트
      DB_USER: bob_user
      DB_PASSWORD: bobpass
      DB_NAME: bob_movie_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - .:/app              # 개발 시 코드 변경 실시간 반영
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload  # 개발 모드
    restart: unless-stopped

  # MySQL 데이터베이스
  mysql:
    image: mysql:8.0
    container_name: bob_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: bob_movie_db
      MYSQL_USER: bob_user
      MYSQL_PASSWORD: bobpass
    ports:
      - "13306:3306"        # 호스트:컨테이너
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  # Redis 캐시
  redis:
    image: redis:7-alpine
    container_name: bob_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mysql_data:

# 기존 컨테이너 정리
# docker-compose down

# 다시 실행
# docker-compose up -d

# 연결 테스트 (포트 3307로)
# docker exec -it bob_mysql mysql -u bob_user -pbobpass bob_movie_db -e "SELECT 1;"

# 또는 로컬에서
# mysql -h 127.0.0.1 -P 3307 -u bob_user -pbobpass bob_movie_db